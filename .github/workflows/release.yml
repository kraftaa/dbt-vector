name: Build Release Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-wheels:
    name: wheel-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: macos-14
            platform: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-dev pkg-config libssl-dev build-essential patchelf

      - name: Build wheel and sdist
        env:
          PYO3_PYTHON: python3
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          ./scripts/build_wheel_with_binary.sh

      - name: Repair Linux wheel for PyPI (manylinux tag)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade auditwheel
          mkdir -p wheelhouse
          auditwheel repair dist/*.whl -w wheelhouse
          rm -f dist/*.whl
          mv wheelhouse/*.whl dist/

      - name: Show built artifacts
        run: ls -lh dist

      - name: Verify wheel contains runnable backend
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel artifacts found in dist/"
          required_suffixes = (
              "dbt_vectorize/bin/pg_embedder",
              "dbt_vectorize/bin/pg_search",
          )

          for whl in wheels:
              with zipfile.ZipFile(whl) as zf:
                  names = zf.namelist()
              missing = [
                  suffix
                  for suffix in required_suffixes
                  if not any(name.endswith(suffix) for name in names)
              ]
              assert not missing, f"{whl} missing wheel files: {missing}"
              print(f"{whl}: backend binaries present")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: sdist
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist only
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          rm -rf dist
          python -m build --sdist --no-isolation
          ls -lh dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: List release files
        run: ls -lh dist

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: pypi
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          verbose: true
