name: Rust Tests (dbt-vectors)

on:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-dev libssl-dev pkg-config build-essential

      - name: Export Python build vars
        run: |
          PYTHON_BIN=$(python3 -c "import sys; print(sys.executable)")
          PYTHON_LIBDIR=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          PYTHON_INCLUDEDIR=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          echo "PYO3_PYTHON=${PYTHON_BIN}" >> "$GITHUB_ENV"
          echo "PYO3_LIB_DIR=${PYTHON_LIBDIR}" >> "$GITHUB_ENV"
          echo "PYO3_INCLUDE_DIR=${PYTHON_INCLUDEDIR}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${PYTHON_LIBDIR}:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/embedding_engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/embedding_engine/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run cargo tests
        working-directory: rust/embedding_engine
        run: |
          rm -rf target
          cargo test -q
