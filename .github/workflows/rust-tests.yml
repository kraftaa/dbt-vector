name: Rust Tests (dbt-vectors)

on:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-dev libssl-dev pkg-config build-essential

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/embedding_engine/target
          key: cargo-${{ runner.os }}-${{ hashFiles('rust/embedding_engine/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Run cargo tests
        working-directory: rust/embedding_engine
        env:
          PYO3_PYTHON: python3
        run: |
          rm -rf target
          cargo test -q
